# netlify.toml - Complete configuration for performance optimization and MIME issues

[build]
  command = "npm run build"
  publish = "dist"
  # Always build. The previous ignore (git diff --quiet $CACHED_COMMIT_REF
  # $COMMIT_REF -- .) self-canceled the 2026-06-11 deploy: after a long gap
  # without git deploys, CACHED_COMMIT_REF can equal COMMIT_REF -> empty diff
  # -> exit 0 -> Netlify cancels. exit 1 forces the build unconditionally.
  ignore = "exit 1"

# ===== EARLY HINTS (103) FOR LCP =====
# Tells browser to start loading resources BEFORE HTML arrives
# Reduces "Resource load delay" significantly
# NOTE: FontAwesome fonts removed - using inline SVG icons

[[headers]]
  for = "/"
  [headers.values]
    Link = "</images/oriol_macias-320.webp>; rel=preload; as=image; type=image/webp; fetchpriority=high"

[[headers]]
  for = "/es"
  [headers.values]
    Link = "</images/oriol_macias-320.webp>; rel=preload; as=image; type=image/webp; fetchpriority=high"

[[headers]]
  for = "/fr"
  [headers.values]
    Link = "</images/oriol_macias-320.webp>; rel=preload; as=image; type=image/webp; fetchpriority=high"

[[headers]]
  for = "/de"
  [headers.values]
    Link = "</images/oriol_macias-320.webp>; rel=preload; as=image; type=image/webp; fetchpriority=high"

# ===== MIME HEADERS CONFIGURATION =====

# Headers for Astro build output (hashed filenames = immutable)
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Headers for optimized images (LCP critical)
[[headers]]
  for = "/images/*.avif"
  [headers.values]
    Content-Type = "image/avif"
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*.webp"
  [headers.values]
    Content-Type = "image/webp"
    Cache-Control = "public, max-age=31536000, immutable"

# Headers for JavaScript files
[[headers]]
  for = "*.js"
  [headers.values]
    Content-Type = "application/javascript; charset=utf-8"
    Cache-Control = "public, max-age=31536000, immutable"

# Service worker must NEVER be long-cached: the generic *.js immutable rule
# above let Cloudflare serve a days-old sw.js, blocking SW updates for
# returning visitors. Explicit rule wins for the exact path.
[[headers]]
  for = "/sw.js"
  [headers.values]
    Content-Type = "application/javascript; charset=utf-8"
    Cache-Control = "no-store"
    Service-Worker-Allowed = "/"

# Headers for CSS files
[[headers]]
  for = "*.css"
  [headers.values]
    Content-Type = "text/css; charset=utf-8"
    Cache-Control = "public, max-age=31536000, immutable"

# ===== FONT HEADERS =====
# FontAwesome removed - using inline SVG icons
# Generic woff2 headers for system fonts only

[[headers]]
  for = "*.woff2"
  [headers.values]
    Content-Type = "font/woff2"
    Cache-Control = "public, max-age=31536000, immutable"
    Access-Control-Allow-Origin = "*"

# ===== SECURITY HEADERS =====
# NOTE: the @netlify/plugin-csp-nonce edge function was REMOVED 2026-06-12:
# it processed every HTML request and its cold starts added 6-7s TTFB for
# the first visitor after idle (measured; also the likely cause of the
# historical GSC 5xx errors). The active CSP is the static allowlist in
# public/_headers (script-src 'self' 'unsafe-inline' + GA/Cloudflare).

# Headers for main HTML and other pages
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    # HSTS with includeSubDomains and preload for Lighthouse Best Practices
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

# ===== LANGUAGE REDIRECTS =====
# Redirect trailing slash versions to non-trailing (Astro uses trailingSlash: 'never')

[[redirects]]
  from = "/es/"
  to = "/es"
  status = 301

[[redirects]]
  from = "/fr/"
  to = "/fr"
  status = 301

[[redirects]]
  from = "/de/"
  to = "/de"
  status = 301

# ===== INVALID ROUTE CLEANUP =====
# Fix routes that were incorrectly generated (e.g., /es/es from previous bug)

[[redirects]]
  from = "/es/es"
  to = "/es"
  status = 301

[[redirects]]
  from = "/es/fr"
  to = "/fr"
  status = 301

[[redirects]]
  from = "/es/de"
  to = "/de"
  status = 301

[[redirects]]
  from = "/fr/es"
  to = "/es"
  status = 301

[[redirects]]
  from = "/fr/fr"
  to = "/fr"
  status = 301

[[redirects]]
  from = "/fr/de"
  to = "/de"
  status = 301

[[redirects]]
  from = "/de/es"
  to = "/es"
  status = 301

[[redirects]]
  from = "/de/fr"
  to = "/fr"
  status = 301

[[redirects]]
  from = "/de/de"
  to = "/de"
  status = 301

# ===== LOCALE-PREFIXED REGIONAL ROUTES =====
# Redirect /es/switzerland to /switzerland (regional pages are not localized)

[[redirects]]
  from = "/es/switzerland/*"
  to = "/switzerland/:splat"
  status = 301

[[redirects]]
  from = "/es/switzerland"
  to = "/switzerland"
  status = 301

[[redirects]]
  from = "/fr/switzerland/*"
  to = "/switzerland/:splat"
  status = 301

[[redirects]]
  from = "/fr/switzerland"
  to = "/switzerland"
  status = 301

[[redirects]]
  from = "/de/switzerland/*"
  to = "/switzerland/:splat"
  status = 301

[[redirects]]
  from = "/de/switzerland"
  to = "/switzerland"
  status = 301

[[redirects]]
  from = "/es/spain/*"
  to = "/spain/:splat"
  status = 301

[[redirects]]
  from = "/es/spain"
  to = "/spain"
  status = 301

[[redirects]]
  from = "/fr/spain/*"
  to = "/spain/:splat"
  status = 301

[[redirects]]
  from = "/fr/spain"
  to = "/spain"
  status = 301

[[redirects]]
  from = "/de/spain/*"
  to = "/spain/:splat"
  status = 301

[[redirects]]
  from = "/de/spain"
  to = "/spain"
  status = 301

# ===== SITEMAP CANONICALIZATION =====
# The legacy static /sitemap.xml was removed; @astrojs/sitemap emits
# sitemap-index.xml + sitemap-0.xml. Keep the old URL resolving for GSC.

[[redirects]]
  from = "/sitemap.xml"
  to = "/sitemap-index.xml"
  status = 301
  force = true

# ===== LEGACY .html URL CLEANUP =====
# build.format:'file' emits flat .html files that Netlify also serves directly,
# creating duplicate URLs (GSC indexed /de.html, /switzerland/zurich.html).
# force = true is required: the files exist on disk and would shadow the rule.
# NOTE: /404.html is intentionally NOT redirected (target of the 404 catch-all).

[[redirects]]
  from = "/index.html"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/es.html"
  to = "/es"
  status = 301
  force = true

[[redirects]]
  from = "/fr.html"
  to = "/fr"
  status = 301
  force = true

[[redirects]]
  from = "/de.html"
  to = "/de"
  status = 301
  force = true

[[redirects]]
  from = "/spain.html"
  to = "/spain"
  status = 301
  force = true

[[redirects]]
  from = "/switzerland.html"
  to = "/switzerland"
  status = 301
  force = true

# ===== GEO CITY CONSOLIDATION (2026-06-15) =====
# The per-city pages were merged into the /switzerland and /spain hubs as
# anchored sections (doorway consolidation). Both the clean URLs (now gone)
# and their legacy .html twins 301 to the corresponding hub anchor.

[[redirects]]
  from = "/switzerland/zurich"
  to = "/switzerland#zurich"
  status = 301
[[redirects]]
  from = "/switzerland/zurich.html"
  to = "/switzerland#zurich"
  status = 301
  force = true

[[redirects]]
  from = "/switzerland/geneva"
  to = "/switzerland#geneva"
  status = 301
[[redirects]]
  from = "/switzerland/geneva.html"
  to = "/switzerland#geneva"
  status = 301
  force = true

[[redirects]]
  from = "/switzerland/basel"
  to = "/switzerland#basel"
  status = 301
[[redirects]]
  from = "/switzerland/basel.html"
  to = "/switzerland#basel"
  status = 301
  force = true

[[redirects]]
  from = "/switzerland/lausanne"
  to = "/switzerland#lausanne"
  status = 301
[[redirects]]
  from = "/switzerland/lausanne.html"
  to = "/switzerland#lausanne"
  status = 301
  force = true

[[redirects]]
  from = "/spain/madrid"
  to = "/spain#madrid"
  status = 301
[[redirects]]
  from = "/spain/madrid.html"
  to = "/spain#madrid"
  status = 301
  force = true

[[redirects]]
  from = "/spain/barcelona"
  to = "/spain#barcelona"
  status = 301
[[redirects]]
  from = "/spain/barcelona.html"
  to = "/spain#barcelona"
  status = 301
  force = true

# ===== 404 HANDLING =====

# Handle 404 pages
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

# Force HTTPS
[[redirects]]
  from = "http://*"
  to = "https://:splat"
  status = 301
  force = true

# NOTE: NO SPA redirect - Astro is a static MPA with separate HTML files per route
# Routes: /, /es/, /fr/, /de/ each have their own index.html

# ===== BUILD ENVIRONMENT =====

[build.environment]
  NODE_VERSION = "22"

# NOTE: Netlify Asset Optimization was deprecated Oct 2023
# Astro handles bundling/minification at build time via Vite
# See: https://answers.netlify.com/t/asset-optimization-deprecated/103986

# ===== NETLIFY FUNCTIONS =====
# Functions disabled - pure static site
